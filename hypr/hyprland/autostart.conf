#################
### AUTOSTART ###
#################

# nm-applet
exec-once = nm-applet &

# blueman
exec-once = blueman-applet

# waybar
exec-once = waybar

# notificaton daemon
exec-once = swaync

# set cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 25

# udiskie
exec-once = udiskie

# OneDrive
exec-once = sleep 5 && onedrivegui

# SynologyDrive
exec-once = QT_QPA_PLATFORM=xcb synology-drive autostart
